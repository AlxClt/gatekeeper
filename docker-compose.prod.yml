services:
  app:
    environment:
      - LOG_TO_DB=true
      - DATABASE_URL=postgresql://gatekeeper:${POSTGRES_PASSWORD:-gatekeeper}@db:5432/gatekeeper
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=gatekeeper
      - POSTGRES_USER=gatekeeper
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-gatekeeper}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gatekeeper"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
